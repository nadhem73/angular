<header class="modern-header">
  <div class="header-container">
    <div class="logo-section">
      <div class="logo-icon">💡</div>
      <h1 class="logo-text">Compus <span class="logo-accent">Ideas</span></h1>
    </div>
    
    <nav class="nav-menu">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
        <span class="nav-icon">🏠</span>
        <span>Accueil</span>
      </a>
      <a routerLink="/suggestions" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">💡</span>
        <span>Suggestions</span>
      </a>
      <a routerLink="/users" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">👥</span>
        <span>Utilisateurs</span>
      </a>
    </nav>
    
    <div class="header-actions">
      <button class="action-button notification-btn" (click)="onNotificationClick()" title="Notifications (non disponible)">
        <span class="icon">🔔</span>
        <span class="badge">3</span>
      </button>
      <button class="action-button profile-btn" (click)="onProfileClick()" title="Profil (non disponible)">
        <span class="icon">👤</span>
      </button>
    </div>
  </div>
</header>
